<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WeatherMinds Pro</title>
<link rel="stylesheet" href="index.css">
<link rel="shortcut icon" href="Weather.png" type="image/x-icon">
</head>

<body>

<header>
    <div class="logo">
        <h2>🌤 WeatherMinds Pro</h2>
    </div>

    <div class="search">
        <input id="cityInput" placeholder="Enter city..." />
        <button id="btn">Search</button>
    </div>
</header>

<div class="container">

    <!-- CURRENT -->
    <div class="card">
        <h3 id="city">City</h3>
        <div class="big-temp" id="temp">--°C</div>
        <p id="desc">Weather</p>
        <hr style="margin:10px 0;opacity:0.2">

        <p id="wind">Wind: --</p>
    </div>

    <!-- FORECAST -->
    <div class="card">
        <h3>5 Day Forecast</h3>
        <div class="forecast" id="forecast"></div>
    </div>

</div>

<script src="index.js"></script>

</body>
</html>
